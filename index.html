<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D2137">
  <title>Trivia Seguridad e Higiene | CD Esteban Echeverría</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --navy: #0D2137;
      --navy-light: #1a3a5c;
      --orange: #F7941D;
      --orange-dark: #d97c0e;
      --green: #27AE60;
      --red: #E74C3C;
      --bg: #EEF2F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7a8d;
      --border: #dde3ec;
      --shadow: 0 4px 24px rgba(13,33,55,0.12);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ESTILOS IGUAL QUE index.html anterior... (por brevedad, copiar los mismos estilos) */
    .screen { display: none; min-height: 100vh; animation: fadeIn .35s ease; }
    .screen.active { display: flex; flex-direction: column; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

    /* [COPIAR TODOS LOS ESTILOS DEL index.html ANTERIOR] */
    /* Por brevedad, no los duplico aquí, pero en producción deben estar todos */

    .error-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-light) 100%);
    }
    .error-content {
      background: var(--white);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
    }
    .error-icon { font-size: 64px; margin-bottom: 20px; }
    .error-title { font-family: 'Oswald', sans-serif; font-size: 24px; color: var(--navy); margin-bottom: 12px; }
    .error-msg { color: var(--text-muted); font-size: 15px; }
  </style>
  
  <!-- COPIAR RESTO DE ESTILOS DEL INDEX.HTML ORIGINAL -->
  <style>
    /* Header Band */
    .header-band {
      background: var(--navy);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-band .logo-mark {
      width: 38px; height: 38px;
      background: var(--orange);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700; font-size: 18px;
      color: var(--white); flex-shrink: 0;
    }
    .header-band .hb-text { color: var(--white); }
    .header-band .hb-text h1 { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 600; }
    .header-band .hb-text p { font-size: 11px; color: rgba(255,255,255,.6); }

    /* Registro */
    #screen-registro { background: var(--bg); }
    .form-body {
      flex: 1;
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .form-title {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--navy); margin-bottom: 4px;
    }
    .form-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--navy); margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      transition: border-color .2s;
      outline: none;
      text-transform: uppercase;
    }
    .field input[type="number"] { text-transform: none; }
    .field input:focus { border-color: var(--orange); }
    .field input.error { border-color: var(--red); animation: shake .3s; }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--navy);
      color: var(--white);
      border: none; border-radius: 14px;
      font-family: 'Oswald', sans-serif;
      font-size: 20px; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary:hover { background: var(--navy-light); }

    /* COPIAR RESTO DE ESTILOS... */
    /* [Por brevedad, en un archivo real debe tener todos los estilos del index.html original] */
  </style>
</head>
<body>

<!-- ERROR SCREEN -->
<div id="screen-error" style="display:none;">
  <div class="error-screen">
    <div class="error-content">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">Trivia No Encontrada</h2>
      <p class="error-msg">El link de esta trivia no es válido o la trivia fue eliminada.</p>
    </div>
  </div>
</div>

<!-- SCREENS NORMALES (copiar del index.html original) -->
<div id="screen-registro" class="screen">
  <div class="header-band">
    <div class="logo-mark">SH</div>
    <div class="hb-text">
      <h1>Registro de Participante</h1>
      <p id="trivia-nombre-header">CD Esteban Echeverría</p>
    </div>
  </div>
  
  <div class="form-body">
    <h2 class="form-title">Tus Datos</h2>
    <p class="form-subtitle">Completá la información para comenzar</p>
    
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="inp-nombre" placeholder="Ej: JUAN" autocomplete="given-name">
    </div>
    
    <div class="field">
      <label>Apellido</label>
      <input type="text" id="inp-apellido" placeholder="Ej: PÉREZ" autocomplete="family-name">
    </div>
    
    <div class="field">
      <label>DNI</label>
      <input type="number" id="inp-dni" placeholder="Sin puntos ni espacios" autocomplete="off">
    </div>
    
    <div class="field">
      <label>Empresa</label>
      <input type="text" id="inp-empresa" placeholder="Ej: ACME S.A." autocomplete="organization">
    </div>
    
    <button class="btn-primary" onclick="submitRegistro()">CONTINUAR</button>
  </div>
</div>

<!-- [COPIAR RESTO DE SCREENS: trivia, firma, final del index.html original] -->

<div id="loading" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;">
  <div style="width:50px;height:50px;border:4px solid rgba(255,255,255,.2);border-top-color:#F7941D;border-radius:50%;animation:spin 1s linear infinite;"></div>
</div>

<div id="toast" style="position:fixed;bottom:-100px;left:50%;transform:translateX(-50%);background:rgba(13,33,55,.95);color:#fff;padding:14px 24px;border-radius:50px;font-size:14px;z-index:10000;transition:bottom .3s;"></div>

<script>
// ──────────────────────────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw98kfXn5lEy8kHzEers0IT5Q73z0DyDRe9KFrcecLhqSE7r3KUsSlCBWH-aA6_7Te6Gw/exec';

// ──────────────────────────────────────────────────────────────────
// CARGAR TRIVIA DINÁMICA
// ──────────────────────────────────────────────────────────────────
let TRIVIA_ACTUAL = null;
let PREGUNTAS = [];

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const triviaId = params.get('trivia');

  if (!triviaId) {
    mostrarError();
    return;
  }

  // Cargar trivia desde localStorage del admin
  const triviasGuardadas = localStorage.getItem('trivias');
  if (!triviasGuardadas) {
    mostrarError();
    return;
  }

  const trivias = JSON.parse(triviasGuardadas);
  TRIVIA_ACTUAL = trivias.find(t => t.id === triviaId);

  if (!TRIVIA_ACTUAL) {
    mostrarError();
    return;
  }

  PREGUNTAS = TRIVIA_ACTUAL.preguntas;
  document.getElementById('trivia-nombre-header').textContent = TRIVIA_ACTUAL.nombre;
  
  mostrarScreen('registro');
  document.getElementById('inp-nombre').focus();
});

function mostrarError() {
  document.getElementById('screen-error').style.display = 'block';
}

function mostrarScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(`screen-${screenId}`);
  if (screen) screen.classList.add('active');
}

// ──────────────────────────────────────────────────────────────────
// ESTADO GLOBAL
// ──────────────────────────────────────────────────────────────────
const STATE = {
  userData: {},
  currentQuestion: 0,
  puntaje: 0,
  respuestas: [],
  numeroParticipacion: '',
  firmaData: ''
};

// ──────────────────────────────────────────────────────────────────
// REGISTRO
// ──────────────────────────────────────────────────────────────────
function submitRegistro() {
  const nombre = document.getElementById('inp-nombre').value.trim().toUpperCase();
  const apellido = document.getElementById('inp-apellido').value.trim().toUpperCase();
  const dni = document.getElementById('inp-dni').value.trim();
  const empresa = document.getElementById('inp-empresa').value.trim().toUpperCase();
  
  const campos = [
    { el: document.getElementById('inp-nombre'), val: nombre },
    { el: document.getElementById('inp-apellido'), val: apellido },
    { el: document.getElementById('inp-dni'), val: dni },
    { el: document.getElementById('inp-empresa'), val: empresa }
  ];
  
  let valid = true;
  campos.forEach(c => {
    if (!c.val) {
      c.el.classList.add('error');
      valid = false;
      setTimeout(() => c.el.classList.remove('error'), 500);
    }
  });
  
  if (!valid) {
    showToast('⚠️ Por favor completá todos los campos');
    return;
  }
  
  if (dni.length < 7 || dni.length > 8) {
    showToast('⚠️ El DNI debe tener 7 u 8 dígitos');
    return;
  }
  
  STATE.userData = { nombre, apellido, dni, empresa };
  mostrarScreen('trivia');
  cargarPregunta();
}

// [COPIAR RESTO DE FUNCIONES DEL index.html original: cargarPregunta, seleccionarOpcion, etc.]

async function registrarEnSheets() {
  if (!GAS_URL || GAS_URL === 'https://script.google.com/macros/s/AKfycbw98kfXn5lEy8kHzEers0IT5Q73z0DyDRe9KFrcecLhqSE7r3KUsSlCBWH-aA6_7Te6Gw/exec') {
    console.warn('GAS_URL no configurada');
    return;
  }

  try {
    const payload = {
      action: 'register',
      triviaId: TRIVIA_ACTUAL.id,
      triviaNombre: TRIVIA_ACTUAL.nombre,
      nombre: STATE.userData.nombre,
      apellido: STATE.userData.apellido,
      dni: STATE.userData.dni,
      empresa: STATE.userData.empresa,
      puntaje: STATE.puntaje,
      numero: STATE.numeroParticipacion,
      firmaCapturada: 'Sí'
    };
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.error('Error registrando:', err);
  }
}

function showToast(msg, ms = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.bottom = '30px';
  setTimeout(() => { t.style.bottom = '-100px'; }, ms);
}

// [RESTO DE FUNCIONES...]
</script>
</body>
</html>
